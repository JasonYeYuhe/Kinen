name: Kinen
options:
  bundleIdPrefix: com.kinen
  deploymentTarget:
    macOS: "15.0"
    iOS: "18.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.38.0"
  groupSortPosition: top
  knownRegions: [en, zh-Hans]

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: KHMK6Q3L3K
    CODE_SIGN_IDENTITY: "Apple Development"
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_STRICT_CONCURRENCY: complete

targets:
  Kinen:
    type: application
    platform: macOS
    sources:
      - Sources
      - path: Resources
        excludes:
          - "Info-iOS.plist"
          - "Kinen-iOS.entitlements"
          - "Info.plist"
    settings:
      base:
        PRODUCT_NAME: Kinen
        PRODUCT_BUNDLE_IDENTIFIER: com.kinen.app
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        INFOPLIST_FILE: Resources/Info.plist
        GENERATE_INFOPLIST_FILE: false
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: YES
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
    entitlements:
      path: Resources/Kinen-macOS.entitlements

  KinenIOS:
    type: application
    platform: iOS
    sources:
      - Sources
      - path: Resources
        excludes:
          - "Info.plist"
          - "Info-iOS.plist"
    settings:
      base:
        PRODUCT_NAME: Kinen
        PRODUCT_BUNDLE_IDENTIFIER: com.kinen.app
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
        INFOPLIST_FILE: Resources/Info-iOS.plist
        GENERATE_INFOPLIST_FILE: false
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
    entitlements:
      path: Resources/Kinen-iOS.entitlements

  KinenTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests
    dependencies:
      - target: Kinen
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kinen.app.tests
