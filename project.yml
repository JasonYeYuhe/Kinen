name: Kinen
options:
  bundleIdPrefix: com.kinen
  deploymentTarget:
    macOS: "15.0"
    iOS: "18.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.38.0"
  groupSortPosition: top
  knownRegions: [en, zh-Hans]

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: KHMK6Q3L3K
    CODE_SIGN_IDENTITY: "Apple Development"
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "0.3.0"
    CURRENT_PROJECT_VERSION: "5"
    SWIFT_STRICT_CONCURRENCY: complete

targets:
  Kinen:
    type: application
    platform: macOS
    sources:
      - Sources
      - path: Resources
        excludes:
          - "Info-iOS.plist"
          - "Kinen-iOS.entitlements"
          - "Info.plist"
    settings:
      base:
        PRODUCT_NAME: Kinen
        PRODUCT_BUNDLE_IDENTIFIER: com.jasonye.kinen
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        INFOPLIST_FILE: Resources/Info.plist
        GENERATE_INFOPLIST_FILE: false
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: YES
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
    entitlements:
      path: Resources/Kinen-macOS.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true

  KinenIOS:
    type: application
    platform: iOS
    sources:
      - Sources
      - path: Resources
        excludes:
          - "Info.plist"
          - "Info-iOS.plist"
    settings:
      base:
        PRODUCT_NAME: Kinen
        PRODUCT_BUNDLE_IDENTIFIER: com.jasonye.kinen
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
        INFOPLIST_FILE: Resources/Info-iOS.plist
        GENERATE_INFOPLIST_FILE: false
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
    capabilities:
      - HealthKit:
    dependencies:
      - target: KinenWidgetExtension
      - target: KinenWatch
    entitlements:
      path: Resources/Kinen-iOS.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.jasonye.kinen
        com.apple.developer.healthkit: true

  KinenWatch:
    type: application
    platform: watchOS
    deploymentTarget:
      watchOS: "11.0"
    sources:
      - KinenWatch
    settings:
      base:
        PRODUCT_NAME: Kinen Watch
        PRODUCT_BUNDLE_IDENTIFIER: com.jasonye.kinen.watch
        GENERATE_INFOPLIST_FILE: true
        TARGETED_DEVICE_FAMILY: "4"
        WATCHOS_DEPLOYMENT_TARGET: "11.0"
        SKIP_INSTALL: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_CFBundleDisplayName: Kinen
        INFOPLIST_KEY_WKCompanionAppBundleIdentifier: com.jasonye.kinen
    entitlements:
      path: KinenWatch/KinenWatch.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.jasonye.kinen

  KinenWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - KinenWidget
    settings:
      base:
        PRODUCT_NAME: KinenWidgetExtension
        PRODUCT_BUNDLE_IDENTIFIER: com.jasonye.kinen.widget
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
        INFOPLIST_FILE: KinenWidget/Info.plist
        GENERATE_INFOPLIST_FILE: false
        TARGETED_DEVICE_FAMILY: "1,2"
        SKIP_INSTALL: YES
    entitlements:
      path: KinenWidget/KinenWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.jasonye.kinen

  KinenTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests
    dependencies:
      - target: Kinen
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jasonye.kinen.tests
        GENERATE_INFOPLIST_FILE: true
